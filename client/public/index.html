<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <title>Skykapital — E&amp;S Due Diligence Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MapLibre loaded from CDN so the app bundler never mangles its web worker -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: '#1a3c5e',
              'navy-dark': '#122d47',
              complete: '#2e7d32',
              'complete-light': '#e8f5e9',
              progress: '#f59e0b',
              'progress-light': '#fffbeb',
              neutral: '#6b7280',
              'neutral-light': '#f3f4f6',
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>
  </body>
</html>
